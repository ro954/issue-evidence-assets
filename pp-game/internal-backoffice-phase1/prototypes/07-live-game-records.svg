  <text x="1412" y="762" class="tiny muted">详情 / 注单 / 钱包</text>

  <rect x="76" y="830" width="730" height="128" rx="18" fill="#f8fafc" stroke="#dbe6f3"/>
  <circle cx="106" cy="860" r="24" class="red"/><text x="98" y="869" class="call">4</text>
