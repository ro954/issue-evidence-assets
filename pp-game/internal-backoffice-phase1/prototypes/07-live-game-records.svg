  <rect x="852" y="830" width="752" height="128" rx="18" fill="#f8fafc" stroke="#dbe6f3"/>
  <circle cx="882" cy="860" r="24" fill="#7c3aed"/><text x="874" y="869" class="call">5</text>
  <text x="918" y="868" class="label">状态口径</text>
