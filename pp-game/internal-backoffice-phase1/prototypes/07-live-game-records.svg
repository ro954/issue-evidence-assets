    <text x="696" y="588">BRL 330 / -</text><rect x="900" y="560" width="96" height="38" rx="19" fill="#fef3c7"/><text x="918" y="587" fill="#b45309">进行中</text>
    <rect x="1056" y="560" width="110" height="38" rx="19" fill="#f1f5f9"/><text x="1075" y="587" fill="#475569">未结算</text><text x="1228" y="588">14:24:09</text>
    <rect x="1412" y="558" width="80" height="42" rx="9" fill="#eff6ff" stroke="#93c5fd"/><text x="1430" y="587" fill="#1d4ed8">详情</text>
    <rect x="1502" y="558" width="70" height="42" rx="9" fill="#fff7ed" stroke="#fdba74"/><text x="1519" y="587" fill="#c2410c">注单</text>
