<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="1600" height="1000" fill="#f8fafc"/>
  <rect x="40" y="36" width="1520" height="114" rx="18" fill="#101828"/>
  <text x="72" y="86" font-family="Arial, 'PingFang SC', sans-serif" font-size="44" font-weight="700" fill="#fff">Mega Roulette 押注穷举对照表</text>
  <text x="72" y="124" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#cbd5e1">QA 对照：我方产品 vs 真 PP，核对下注、开奖、Mega 倍数、派彩、现金净额、历史/注单</text>
  <rect x="60" y="190" width="700" height="330" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="90" y="250" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700" fill="#0f172a">① 押注点覆盖</text>
  <text x="90" y="305" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" fill="#334155">基础可落筹下注点</text><text x="380" y="305" font-family="Arial" font-size="24" fill="#b91c1c">157 个</text><text x="500" y="305" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#475569">0-36 × 37 种结果</text>
  <text x="90" y="350" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" fill="#334155">直注</text><text x="380" y="350" font-family="Arial" font-size="24" fill="#b91c1c">37 个</text><text x="500" y="350" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#475569">普通 29:1；Mega 用 T-1</text>
  <text x="90" y="395" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" fill="#334155">分/街/角/线</text><text x="380" y="395" font-family="Arial" font-size="24" fill="#b91c1c">60 / 14 / 23 / 11</text><text x="500" y="395" font-family="Arial" font-size="20" fill="#475569">17:1 / 11:1 / 8:1 / 5:1</text>
  <text x="90" y="440" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" fill="#334155">列/打/均等机会</text><text x="380" y="440" font-family="Arial" font-size="24" fill="#b91c1c">3 / 3 / 6</text><text x="500" y="440" font-family="Arial" font-size="20" fill="#475569">2:1 / 2:1 / 1:1</text>
  <text x="90" y="485" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" fill="#334155">组合/快捷下注</text><text x="380" y="485" font-family="Arial" font-size="24" fill="#b91c1c">394 个</text><text x="500" y="485" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#475569">赛道、邻注、尾数、Full Complete</text>
  <rect x="840" y="190" width="700" height="330" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="870" y="250" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700" fill="#0f172a">② 结算口径</text>
  <circle cx="886" cy="296" r="16" fill="#ea580c"/><text x="881" y="303" font-family="Arial" font-size="18" font-weight="700" fill="#fff">1</text><text x="920" y="291" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" fill="#0f172a">普通命中</text><text x="920" y="321" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#475569">现金净额 = S × R(A)</text>
<circle cx="886" cy="352" r="16" fill="#ea580c"/><text x="881" y="359" font-family="Arial" font-size="18" font-weight="700" fill="#fff">2</text><text x="920" y="347" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" fill="#0f172a">普通未中</text><text x="920" y="377" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#475569">现金净额 = -S</text>
<circle cx="886" cy="408" r="16" fill="#ea580c"/><text x="881" y="415" font-family="Arial" font-size="18" font-weight="700" fill="#fff">3</text><text x="920" y="403" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" fill="#0f172a">Mega 直注命中</text><text x="920" y="433" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#475569">现金净额 = S × (T-1)，总返还 = S × T</text>
<circle cx="886" cy="464" r="16" fill="#ea580c"/><text x="881" y="471" font-family="Arial" font-size="18" font-weight="700" fill="#fff">4</text><text x="920" y="459" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" fill="#0f172a">组合注命中 Mega</text><text x="920" y="489" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#475569">只替换命中的直注子注，其余子注按普通赔率</text>
<circle cx="886" cy="520" r="16" fill="#ea580c"/><text x="881" y="527" font-family="Arial" font-size="18" font-weight="700" fill="#fff">5</text><text x="920" y="515" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" fill="#0f172a">0 开出</text><text x="920" y="545" font-family="Arial, 'PingFang SC', sans-serif" font-size="19" fill="#475569">均等机会按 La Partage：现金净额 = -S/2</text>
  <rect x="60" y="570" width="1480" height="340" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="90" y="635" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700" fill="#0f172a">③ 产物与验收</text>
  <text x="90" y="690" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#0f172a">文件</text><text x="390" y="690" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#0f172a">内容</text><text x="670" y="690" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">行数</text><text x="980" y="690" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#0f172a">关键字段</text><text x="1260" y="690" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="#0f172a">验收重点</text>
  <line x1="90" y1="712" x2="1505" y2="712" stroke="#cbd5e1" stroke-width="2"/>
  <text x="90" y="755" font-family="Arial" font-size="20" fill="#334155">atomic CSV</text><text x="390" y="755" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#334155">基础下注 × 开奖结果</text><text x="670" y="755" font-family="Arial" font-size="20" fill="#334155">5845</text><text x="980" y="755" font-family="Arial" font-size="20" fill="#334155">A/B/R/T/现金净额</text><text x="1260" y="755" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#334155">逐下注点核对</text>
  <text x="90" y="812" font-family="Arial" font-size="20" fill="#334155">shortcut CSV</text><text x="390" y="812" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#334155">组合注拆子注求和</text><text x="670" y="812" font-family="Arial" font-size="20" fill="#334155">18219</text><text x="980" y="812" font-family="Arial" font-size="20" fill="#334155">子注/总筹码/命中子注</text><text x="1260" y="812" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#334155">组合与 Mega 子注</text>
  <rect x="90" y="842" width="1415" height="48" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="112" y="873" font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#7c2d12">标注：① 覆盖范围 ② 派彩公式 ③ 交付文件与 QA 通过标准。完整逐行矩阵见 Gist CSV。</text>
