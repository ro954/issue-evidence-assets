    <text x="1290" y="420" font-family="Heiti SC" font-size="18" fill="#334155" font-weight="650" text-anchor="start">2. 查询和列表缺关键 ID、结果、金额、归档状态。</text>
    <text x="1290" y="475" font-family="Heiti SC" font-size="18" fill="#334155" font-weight="650" text-anchor="start">3. 缺注单、Wallet、局归档、消息流水和 #135 链路。</text>
